<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MicroMatch — README banner (dark)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 320px; }

    body {
      background: #0F172A;
      font-family: 'Inter', system-ui, sans-serif;
      color: #F8FAFC;
      position: relative;
      overflow: hidden;
      padding: 56px 72px;
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* Coral + warm glow on dark slate — matches the auth panel's atmosphere */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-coral {
      top: -90px;
      right: -100px;
      width: 460px;
      height: 460px;
      background: rgba(255, 107, 107, 0.32);
      filter: blur(80px);
    }
    .blob-amber {
      bottom: -180px;
      left: 22%;
      width: 480px;
      height: 480px;
      background: rgba(253, 186, 116, 0.22);
      filter: blur(100px);
    }
    .blob-blue {
      top: 30%;
      left: -120px;
      width: 320px;
      height: 320px;
      background: rgba(147, 197, 253, 0.18);
      filter: blur(90px);
    }

    .logo-wrap {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .logo-wrap img {
      width: 96px;
      height: 96px;
      display: block;
    }

    .copy {
      position: relative;
      z-index: 1;
    }
    .wordmark {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #F8FAFC;
      margin-bottom: 14px;
    }
    .tagline {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: #F8FAFC;
      max-width: 880px;
    }
    .coral-gradient {
      background: linear-gradient(135deg, #FF8B7B 0%, #FFB07F 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: italic;
    }
    .sub {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(248, 250, 252, 0.65);
      max-width: 740px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="blob blob-coral"></div>
  <div class="blob blob-amber"></div>
  <div class="blob blob-blue"></div>

  <div class="logo-wrap">
    <img src="logo_new.png" alt="MicroMatch logo">
  </div>

  <div class="copy">
    <div class="wordmark">MicroMatch</div>
    <div class="tagline">Make a big impact in <span class="coral-gradient">a few minutes</span>.</div>
    <div class="sub">Micro-volunteering for NGOs and global communities.</div>
  </div>
</body>
</html>
