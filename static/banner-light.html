<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MicroMatch — README banner (light)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 320px; }

    body {
      background: #FDFCF8;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1E293B;
      position: relative;
      overflow: hidden;
      padding: 56px 72px;
      display: flex;
      align-items: center;
      gap: 36px;
    }

    /* Atmospheric blobs lifted from landing hero */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-yellow {
      top: -110px;
      right: -60px;
      width: 360px;
      height: 360px;
      background: rgba(253, 224, 71, 0.45);
      filter: blur(70px);
    }
    .blob-coral {
      bottom: -160px;
      left: 18%;
      width: 480px;
      height: 480px;
      background: rgba(255, 107, 107, 0.18);
      filter: blur(90px);
    }

    .logo-wrap {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .logo-wrap img {
      width: 96px;
      height: 96px;
      display: block;
    }

    .copy {
      position: relative;
      z-index: 1;
    }
    .wordmark {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #1E293B;
      margin-bottom: 14px;
    }
    .tagline {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: #1E293B;
      max-width: 880px;
    }
    .coral-gradient {
      background: linear-gradient(135deg, #FF6B6B 0%, #ff9e5e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: italic;
    }
    .sub {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(30, 41, 59, 0.65);
      max-width: 740px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="blob blob-yellow"></div>
  <div class="blob blob-coral"></div>

  <div class="logo-wrap">
    <img src="logo_new.png" alt="MicroMatch logo">
  </div>

  <div class="copy">
    <div class="wordmark">MicroMatch</div>
    <div class="tagline">Make a big impact in <span class="coral-gradient">a few minutes</span>.</div>
    <div class="sub">Micro-volunteering for NGOs and global communities.</div>
  </div>
</body>
</html>
