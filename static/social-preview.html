<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MicroMatch — social preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 1280px; height: 640px; }

    body {
      background: #FDFCF8;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1E293B;
      position: relative;
      overflow: hidden;
      padding: 80px 96px;
    }

    /* Atmospheric blobs lifted from the landing hero */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-yellow {
      top: -180px;
      right: -120px;
      width: 520px;
      height: 520px;
      background: rgba(253, 224, 71, 0.45);
      filter: blur(80px);
    }
    .blob-coral {
      bottom: -260px;
      left: 28%;
      width: 620px;
      height: 620px;
      background: rgba(255, 107, 107, 0.20);
      filter: blur(110px);
    }
    .blob-blue {
      top: 35%;
      left: -160px;
      width: 380px;
      height: 380px;
      background: rgba(147, 197, 253, 0.30);
      filter: blur(100px);
    }

    .header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .header img {
      width: 64px;
      height: 64px;
      display: block;
    }
    .header span {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1E293B;
    }

    .hero {
      position: relative;
      z-index: 1;
      margin-top: 84px;
      max-width: 920px;
    }
    .hero h1 {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 88px;
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: -0.03em;
      margin-bottom: 28px;
      color: #1E293B;
    }
    .coral-gradient {
      background: linear-gradient(135deg, #FF6B6B 0%, #ff9e5e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: italic;
    }
    .hero p {
      font-size: 24px;
      font-weight: 500;
      color: rgba(30, 41, 59, 0.7);
      line-height: 1.5;
      max-width: 760px;
    }

    .chips {
      position: absolute;
      bottom: 64px;
      right: 96px;
      display: flex;
      gap: 12px;
      z-index: 1;
    }
    .chip {
      padding: 10px 22px;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
    }
    .chip-translation { background: #F3E8FF; color: #7C3AED; }
    .chip-design      { background: #FCE7F3; color: #DB2777; }
    .chip-data        { background: #FEF3C7; color: #D97706; }
  </style>
</head>
<body>
  <div class="blob blob-yellow"></div>
  <div class="blob blob-blue"></div>
  <div class="blob blob-coral"></div>

  <div class="header">
    <img src="logo_new.png" alt="MicroMatch logo">
    <span>MicroMatch</span>
  </div>

  <section class="hero">
    <h1>Make a big impact<br>in <span class="coral-gradient">a few minutes</span>.</h1>
    <p>Micro-volunteering for NGOs and global communities.</p>
  </section>

  <div class="chips">
    <span class="chip chip-translation">#translation</span>
    <span class="chip chip-design">#design</span>
    <span class="chip chip-data">#data</span>
  </div>
</body>
</html>
